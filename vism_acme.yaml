vism_acme:
  logging:
    log_root: "vism_acme"
    verbose: true

  nonce_ttl_seconds: "300"
  retry_after_seconds: "5"

  http-01:
    port: 80
    follow_redirect: true
    timeout_seconds: 2
    retries: 3
    retry_delay_seconds: 5

  security:
    data_validation_key: "super-secret-key"

  s3:
    bucket: "vism"
    endpoint: "localhost:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"

  database:
    data_validation_key: "super-secret-key"
    host: "localhost"
    port: "5432"
    database: "vism_acme"
    username: "vism_acme"
    password: "vism_acme"

  profiles:
    - name: "default"
      ca: "int_ca"
      enabled: true
      default: true
      days: 90
      allowed_challenge_types:
        - "http-01"
      allowed_extended_key_usage_oids:
        - 1.3.6.1.5.5.7.3.2
        - 1.3.6.1.5.5.7.3.1
    - name: "secondary"
      ca: "other-ca"
      enabled: true
      default: false
      days: 7
