vism_ca:
  logging:
    log_root: "vism_ca"
    verbose: true

  security:
    data_validation_key: "super-secret-key"

  rabbitmq:
    leader_queue: "leader"

    host: "127.0.0.1"
    port: "5672"
    user: "vism_acme"
    password: "vism_acme"
    vhost: "/"

    csr_routing_key: "csr"
    cert_routing_key: "cert"

    csr_queue: "csr"
    cert_queue: "cert"

    csr_exchange: "csr"
    cert_exchange: "cert"

    max_retries: "5"
    retry_delay_seconds: "60"

  s3:
    bucket: "vism"
    endpoint: "http://127.0.0.1:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"

  database:
    data_validation_key: "super-secret-key"
    host: "127.0.0.1"
    port: "5432"
    database: "vism_acme"
    username: "vism_acme"
    password: "vism_acme"

  pkcs11:
    lib_path: /usr/lib64/libsofthsm2.so
    token_label: TEST_01
    user_pin: "1234"

  x509_certificates:
    - name: "root_ca"
      key:
        algorithm: RSA
        bits: 4096
      x509:
        days: 30
        crl_days: 7
        subject_name:
          common_name: "Root CA"
        basic_constraints:
          ca: true
          path_length: 1
          critical: true
        key_usage:
          critical: true
          crl_sign: true
          key_cert_sign: true
    - name: "int_ca"
      signed_by: "root_ca"
      key:
        algorithm: RSA
        bits: 4096
      x509:
        days: 10
        crl_days: 7
        subject_name:
          common_name: "Inter CA"
        basic_constraints:
          ca: true
          path_length: 0
          critical: true
        key_usage:
          critical: true
          crl_sign: true
          key_cert_sign: true
